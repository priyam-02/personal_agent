# Additional network policy for Jarvis email agent
# Adds Gmail API access on top of the baseline sandbox policies
# Apply with: openshell policy set network-policy.yaml

gmail:
  name: gmail
  endpoints:
    - host: gmail.googleapis.com
      port: 443
      protocol: rest
      tls: terminate
      enforcement: enforce
      rules:
        - allow:
            method: '*'
            path: /**
    - host: oauth2.googleapis.com
      port: 443
      protocol: rest
      tls: terminate
      enforcement: enforce
      rules:
        - allow:
            method: '*'
            path: /**
    - host: www.googleapis.com
      port: 443
      protocol: rest
      tls: terminate
      enforcement: enforce
      rules:
        - allow:
            method: GET
            path: /**
